services:
  postgres:
    image: postgres:17-alpine
    container_name: job-candidate-matcher-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: jcm_user
      POSTGRES_PASSWORD: jcm_password
      POSTGRES_DB: job_candidate_matcher
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/seed.sql:/docker-entrypoint-initdb.d/01-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jcm_user -d job_candidate_matcher"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
