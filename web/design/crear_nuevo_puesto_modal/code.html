<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-primary": "#002388",
                        "tertiary": "#ffb59b",
                        "primary-fixed-dim": "#b8c3ff",
                        "background": "#0b1326",
                        "on-background": "#dae2fd",
                        "surface-container-lowest": "#060e20",
                        "error": "#ffb4ab",
                        "on-tertiary-container": "#ffece6",
                        "on-primary-container": "#efefff",
                        "secondary-fixed": "#d5e3fc",
                        "primary": "#b8c3ff",
                        "surface-variant": "#2d3449",
                        "secondary": "#b9c7df",
                        "inverse-primary": "#124af0",
                        "on-tertiary-fixed": "#380d00",
                        "surface": "#0b1326",
                        "primary-container": "#2e5bff",
                        "on-surface": "#dae2fd",
                        "inverse-surface": "#dae2fd",
                        "on-error": "#690005",
                        "tertiary-fixed": "#ffdbcf",
                        "primary-fixed": "#dde1ff",
                        "on-tertiary": "#5b1a00",
                        "on-surface-variant": "#c4c5d9",
                        "on-error-container": "#ffdad6",
                        "secondary-container": "#3c4a5e",
                        "surface-container": "#171f33",
                        "surface-container-low": "#131b2e",
                        "secondary-fixed-dim": "#b9c7df",
                        "on-secondary-fixed": "#0d1c2e",
                        "outline": "#8e90a2",
                        "on-primary-fixed-variant": "#0035be",
                        "surface-container-highest": "#2d3449",
                        "outline-variant": "#434656",
                        "on-tertiary-fixed-variant": "#812800",
                        "on-secondary": "#233144",
                        "inverse-on-surface": "#283044",
                        "surface-tint": "#b8c3ff",
                        "on-secondary-container": "#abb9d1",
                        "on-primary-fixed": "#001356",
                        "tertiary-container": "#c24100",
                        "surface-bright": "#31394d",
                        "error-container": "#93000a",
                        "tertiary-fixed-dim": "#ffb59b",
                        "surface-container-high": "#222a3d",
                        "on-secondary-fixed-variant": "#3a485b",
                        "surface-dim": "#0b1326"
                    },
                    fontFamily: {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b1326;
        }
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 2rem;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen overflow-hidden">
<!-- Background Bento Content (Blurred/Overlaid) -->
<div class="fixed inset-0 z-0 p-8 filter blur-sm opacity-40">
<header class="flex justify-between items-center mb-12">
<h1 class="text-3xl font-black tracking-tighter text-primary">Evaluación de Élite</h1>
<div class="flex gap-4">
<div class="h-10 w-10 rounded-full bg-surface-container"></div>
<div class="h-10 w-10 rounded-full bg-surface-container"></div>
</div>
</header>
<div class="bento-grid">
<div class="col-span-8 h-64 bg-surface-container-low rounded-xl"></div>
<div class="col-span-4 h-64 bg-surface-container rounded-xl"></div>
<div class="col-span-4 h-96 bg-surface-container rounded-xl"></div>
<div class="col-span-4 h-96 bg-surface-container-low rounded-xl"></div>
<div class="col-span-4 h-96 bg-surface-container rounded-xl"></div>
</div>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-background/60 backdrop-blur-md">
<!-- Modal Container -->
<div class="w-full max-w-2xl bg-surface-container-low rounded-xl shadow-[0_40px_100px_rgba(0,0,0,0.6)] border border-outline-variant/10 overflow-hidden">
<!-- Modal Header -->
<div class="px-8 pt-8 pb-6 flex justify-between items-start">
<div>
<h2 class="text-2xl font-bold tracking-tight text-on-surface">Crear Puesto de Trabajo</h2>
<p class="text-on-surface-variant text-sm mt-1">Define los parámetros del nuevo observatorio de talento.</p>
</div>
<button class="text-on-surface-variant hover:text-on-surface transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Form Content -->
<div class="px-8 py-2 space-y-6">
<!-- Title Input -->
<div class="space-y-2">
<label class="text-xs font-semibold uppercase tracking-widest text-primary/70 px-1">Título del Puesto</label>
<input class="w-full bg-surface-container border-none rounded-lg p-4 text-on-surface placeholder:text-on-surface-variant/30 focus:ring-2 focus:ring-primary/40 transition-all outline-none" placeholder="Ej. Senior Cloud Architect" type="text"/>
</div>
<!-- Description Textarea -->
<div class="space-y-2">
<label class="text-xs font-semibold uppercase tracking-widest text-primary/70 px-1">Descripción</label>
<textarea class="w-full bg-surface-container border-none rounded-lg p-4 text-on-surface placeholder:text-on-surface-variant/30 focus:ring-2 focus:ring-primary/40 transition-all outline-none resize-none" placeholder="Describe las responsabilidades principales..." rows="4"></textarea>
</div>
<!-- Requirements (Chips) -->
<div class="space-y-2">
<label class="text-xs font-semibold uppercase tracking-widest text-primary/70 px-1">Requisitos Clave</label>
<div class="flex flex-wrap gap-2 mb-2">
<span class="inline-flex items-center gap-2 px-3 py-1.5 bg-secondary-container text-on-secondary-container rounded-md text-sm font-medium">
                            Kubernetes <span class="material-symbols-outlined text-xs cursor-pointer">close</span>
</span>
<span class="inline-flex items-center gap-2 px-3 py-1.5 bg-secondary-container text-on-secondary-container rounded-md text-sm font-medium">
                            Python <span class="material-symbols-outlined text-xs cursor-pointer">close</span>
</span>
<span class="inline-flex items-center gap-2 px-3 py-1.5 bg-secondary-container text-on-secondary-container rounded-md text-sm font-medium">
                            AWS <span class="material-symbols-outlined text-xs cursor-pointer">close</span>
</span>
<button class="inline-flex items-center gap-1 px-3 py-1.5 border border-dashed border-outline-variant text-on-surface-variant rounded-md text-sm hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-sm">add</span> Añadir
                        </button>
</div>
</div>
<!-- Multi-column: Location & Salary -->
<div class="grid grid-cols-2 gap-4">
<div class="space-y-2">
<label class="text-xs font-semibold uppercase tracking-widest text-primary/70 px-1">Ubicación</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50">location_on</span>
<input class="w-full bg-surface-container border-none rounded-lg p-4 pl-12 text-on-surface placeholder:text-on-surface-variant/30 focus:ring-2 focus:ring-primary/40 transition-all outline-none" placeholder="Remoto / Madrid" type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="text-xs font-semibold uppercase tracking-widest text-primary/70 px-1">Rango Salarial</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50">payments</span>
<input class="w-full bg-surface-container border-none rounded-lg p-4 pl-12 text-on-surface placeholder:text-on-surface-variant/30 focus:ring-2 focus:ring-primary/40 transition-all outline-none" placeholder="60k - 85k EUR" type="text"/>
</div>
</div>
</div>
</div>
<!-- Modal Actions -->
<div class="p-8 mt-4 flex items-center justify-end gap-4 bg-surface-container-lowest/30">
<button class="px-6 py-2.5 text-on-surface-variant font-medium hover:text-on-surface transition-colors">
                    Cancelar
                </button>
<button class="px-8 py-2.5 bg-gradient-to-r from-primary-container to-inverse-primary text-on-primary-container font-bold rounded-full shadow-lg hover:shadow-primary-container/20 active:scale-95 transition-all duration-300">
                    Publicar Puesto
                </button>
</div>
</div>
</div>
</body></html>
